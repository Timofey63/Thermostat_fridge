<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>ESP32-C3</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>

<body>
    <h3>Current temperature: <span id="status">...</span></h3>

    <div class="row">
        <span class="label">Temp off:</span>
        <input type="text" id="textInput" placeholder="-15">
        <button onclick="sendText1()">Send</button>
    </div>
    <br>
    <br>
    <div class="row">
        <span class="label">Interval:</span>
        <input type="text" id="textInput2" placeholder="2">
        <button onclick="sendText2()">Send</button>
    </div>
    <br>
    <br>
    <div class="row">
        <span class="label">Time update (m) TODO:</span>
        <input type="text" id="textInput3" placeholder="5">
        <button onclick="sendText3()">Send</button>
    </div>
    <br>
    <br>
    <div class="row">
        <span class="label">Max runtime (m):</span>
        <input type="text" id="textInput4" placeholder="30">
        <button onclick="sendText4()">Send</button>
    </div>
    <br>
    <br>
    <div class="history">
    <h2>history</h2>
    <div id="historyList"></div>
</div>
</body>
</html>
